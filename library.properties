name=PacketSerial
version=2.0.0
author=Christopher Baker <info@christopherbaker.net>, Ignacio Santolin
maintainer=Christopher Baker <info@christopherbaker.net>, Ignacio Santolin
sentence=Modern, industrial-grade packet-serial communication for Arduino (Zero-Heap, ETL-based).
paragraph=PacketSerial is a robust library that facilitates packet-based serial communication (COBS, SLIP) with Zero-Heap memory management. It integrates with ETL (Embedded Template Library) for deterministic behavior, uses C++17 Zero-Cost abstractions, and provides integrated CRC validation and error handling.
category=Communication
